name: India HVAC Crawler

# 매주 월요일 새벽 2시(한국시간)에 자동으로 실행되도록 설정 (UTC 기준 일요일 17:00)
on:
  schedule:
    - cron: '0 17 * * 0'
  workflow_dispatch: # 필요할 때 깃허브 웹사이트에서 버튼 눌러 수동 실행도 가능하게 함

jobs:
  scrape_india:
    runs-on: ubuntu-latest # 깃허브가 제공하는 최신 리눅스 가상 컴퓨터 사용

    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: Node.js 환경 준비
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 필수 패키지 및 Playwright 브라우저 설치
      run: |
        npm install
        npx playwright install chromium --with-deps

    - name: 크롤러 실행 및 구글로 데이터 전송
      env:
        # 구글 API 키나 GAS 웹앱 주소 같은 민감한 정보는 깃허브 시크릿에 안전하게 저장하여 사용
        GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
      run: node india_crawler.js
