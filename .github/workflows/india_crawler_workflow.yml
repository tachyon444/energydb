name: India HVAC Crawler

on:
  schedule:
    - cron: '0 17 * * 0'
  workflow_dispatch:

jobs:
  scrape_india:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 환경 준비
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 및 Playwright Chromium 설치
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: India crawler 실행 및 GAS로 전송
        env:
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
          INDIA_INGEST_TOKEN: ${{ secrets.INDIA_INGEST_TOKEN }}
          INDIA_HEADLESS: 'true'
          INDIA_TZ: 'Asia/Seoul'
        run: node india_crawler.js
